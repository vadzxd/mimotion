name: 刷步数

on:
  schedule:
    - cron: '54 1,4,7,10,12,14 * * *' # randomized
    - cron: '55 14 * * *' # fixed final, Beijing 22:55
  workflow_dispatch:
    inputs:
      fixed_step:
        description: "Optional fixed step count for this run"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }} #此处PAT需要申请，教程详见：README
      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y
          
      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          
      - name: 开始
        env:
            CONFIG: ${{ secrets.CONFIG }}
            AES_KEY: ${{ secrets.AES_KEY }}
            FIXED_STEP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.fixed_step || '' }}
            FINAL_STEP: ${{ vars.FINAL_STEP || '22000' }}
            RUN_SCHEDULE: ${{ github.event.schedule }}
        run: |
          pip3 install requests pytz pycryptodome
          if [ "$RUN_SCHEDULE" = "55 14 * * *" ]; then
            export FIXED_STEP="$FINAL_STEP"
          fi
          python3 main.py

      - name: persist tokens
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .
          git commit -m "persist tokens trigger by ${{ github.event_name }}"
          git push origin master
